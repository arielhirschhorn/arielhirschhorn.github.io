<script>
  var images = [];
    images[0] = "carousel/mom_beach_2_3.jpg";
    images[1] = "carousel/michelle_ig.jpg";
    images[2] = "carousel/denim.jpg";
window.onload = function() {
document.slide.src = images[0];
var i = 0;
var advance = true;





function changeImg() {

if(i < images.length - 1 && advance == true) {
i++;
} else if (i < images.length - 1 && advance == false) {
i--;
} else if (i == 0 && advance == false) {
i =2;
} else {
  i=0;
}
  console.log(i)
document.slide.src = images[i];
}


document.getElementById('prev-btn').onclick = function() {
advance = false;
console.log("prev clicked");
changeImg();
}

document.getElementById('next-btn').onclick = function() {
advance = true;
console.log("next clicked");
changeImg();
}
}
