<script>
document.slide.src = images[0];
var i = 0;
var advance = true;
images[0] = "carousel/mom_beach_2_3.jpg";
images[1] = "carousel/michelle_2_3.jpg";
images[2] = "carousel/mask_2_3.jpg";

var images = [];


function changeImg() {

if(i < images.length - 1 && advance == true) {
i++;
} else if (i < images.length - 1 && advance == false) {
i--;
} else {
  i=0;
}
document.slide.src = images[i];
}


document.getElementById('carousel-control-next').onclick = function() {
advance = true;
console.log("advance clicked");
changeImg();
}

document.getElementById('carousel-control-prev').onclick = function() {
advance = false;
console.log("previous clicked");
changeImg();
}
</script>
