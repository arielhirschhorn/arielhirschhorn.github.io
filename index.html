<!doctype html>
<html lang ="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title> Ariel Hirschhorn</title>
        <link rel="shortcut icon" type="image/x-icon" href="favicon.ico?">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx" crossorigin="anonymous">
        <style>

            html,body {
                background: url(assets/tissue.jpg) top right no-repeat;
                background-attachment: fixed;
                background-size: cover;
                height: 100%

            }

            button {
              border: none;
              background-color:transparent
              }

              .box {
                position: relative;

              }
          

              .image:before {
                position: absolute;
                left: 0; 
                right: 0;
                top: 0;
                bottom: 0; 
                margin: auto;
                height: 25vh;
                width: 25vw;
                content: url(assets/site_name_white.png);
                transition: opacity 0.5s ease;
                -webkit-transition: opacity 0.5s ease;
              }

              .image:after {
                position: absolute;
                left: 0; 
                right: 0;
                top: 0;
                bottom: 0; 
                margin: auto; 
                height: 25vh;
                width: 25vw;
                opacity: 0;
                content: url(assets/site_name_gray.png);
                transition: opacity 0.5s ease;
                -webkit-transition: opacity 0.5s ease;
              }

            .image:hover:after {
            opacity: 1;
            }

            .image:hover:before {
            opacity: 0;
            }



        </style>
    </head>
    
    <body>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-A3rJD856KowSb7dwlZdYEkO39Gagi7vIsF0jrRAoQmDKKtQBHUuLZ9AsSv4jD4Xa" crossorigin="anonymous"></script>

        <div class="h-100 d-flex text-white align-items-center justify-content-center">
            <div class="row">
                <div class="col text-center">
                <a href="/about.html"> 
                  <button>
                    <div class ="box">
                    <div class= "image">
                    </div>
                  </button>
                  </a>
                </div>

                <div class ="row justify-content-center">

                  <div class="col text-center">
                    <a href="/photo.html">  
                    <button>
                      <img src="assets/photo_white.png" class="img-fluid">
                    </button>
                    </a>
                  </div>

                  <div class="col text-center">
                    <a href="/studio_art.html">  
                      <button>
                        <img src="assets/studioart_white.png" class="img-fluid">
                      </button>
                    </a>
                    </div>

                    <div class="col text-center">
                      <a href="/code.html">  
                      <button>
                        <img src="assets/code_white.png" class="img-fluid">
                      </button>
                      </a> 
                      </div>
                </div>  
            </div>
          </div>
    </body>
</html>
